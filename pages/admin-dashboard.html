<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Dashboard | PRECISION LAB</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-surface dark:bg-slate-950 font-body text-on-surface dark:text-slate-100 transition-colors duration-300">

    <div id="navbar-placeholder"></div>

    <div class="flex min-h-screen pt-16">
        <!-- Sidebar -->
        <aside class="hidden lg:flex flex-col w-64 border-r border-slate-200 bg-slate-50 p-6 space-y-2">
            <h2 class="text-blue-700 font-bold text-xs uppercase tracking-widest mb-4 font-headline">Operations</h2>
            <a href="#" class="flex items-center gap-3 px-4 py-3 bg-white text-blue-700 rounded-lg shadow-sm font-bold"><span class="material-symbols-outlined">dashboard</span> Dashboard</a>
            <a href="admin-reviews.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-600 transition-all font-bold"><span class="material-symbols-outlined">rate_review</span> Reviews</a>
            <a href="voltage.html" class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-600 transition-all font-bold"><span class="material-symbols-outlined">bolt</span> Voltage</a>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 lg:p-12 space-y-12">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-4xl font-bold font-headline tracking-tighter text-on-surface uppercase">Management Console</h1>
                    <p class="text-slate-500 mt-2 max-w-2xl">High-precision hardware inventory and curated user feedback moderator.</p>
                </div>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold text-sm uppercase tracking-widest shadow-lg transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">add</span> New Product
                </button>
            </header>

            <!-- Stats -->
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <span class="material-symbols-outlined text-primary mb-4 p-2 bg-blue-50 rounded-lg">memory</span>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Components</p>
                    <h3 id="stat-components" class="text-3xl font-headline font-bold mt-1">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <span class="material-symbols-outlined text-primary mb-4 p-2 bg-blue-50 rounded-lg">rate_review</span>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Reviews</p>
                    <h3 id="stat-reviews" class="text-3xl font-headline font-bold mt-1">0</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                    <span class="material-symbols-outlined text-primary mb-4 p-2 bg-blue-50 rounded-lg">star</span>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Average Rating</p>
                    <h3 id="stat-rating" class="text-3xl font-headline font-bold mt-1">0.0 <span class="text-lg text-slate-300">/ 5.0</span></h3>
                </div>
            </section>

            <!-- Table -->
            <section class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-[10px] uppercase tracking-widest font-bold text-slate-400">ID</th>
                            <th class="px-6 py-4 text-[10px] uppercase tracking-widest font-bold text-slate-400">Component</th>
                            <th class="px-6 py-4 text-[10px] uppercase tracking-widest font-bold text-slate-400">Category</th>
                            <th class="px-6 py-4 text-[10px] uppercase tracking-widest font-bold text-slate-400 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body" class="divide-y divide-slate-100">
                        <!-- Dữ liệu được tiêm qua js -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="product-modal" class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto border border-slate-100 dark:border-slate-800 shadow-2xl">
            <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center sticky top-0 bg-white dark:bg-slate-900 z-10">
                <h3 id="modal-title" class="text-xl font-bold font-headline">Add New Product</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <form id="product-form" onsubmit="saveProduct(event)">
                    <input type="hidden" id="prod-original-id">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Product ID</label>
                            <input required id="prod-id" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" type="text" placeholder="e.g. rtx-5090"/>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Category</label>
                            <select required id="prod-category" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none">
                                <option value="graphics">GPU / Graphics</option>
                                <option value="processors">CPU / Processors</option>
                                <option value="motherboards">Motherboard</option>
                                <option value="memory">RAM / Memory</option>
                                <option value="storage">SSD / Storage</option>
                                <option value="psu">Power Supply</option>
                                <option value="case">Cases</option>
                                <option value="cooling">Cooling</option>
                                <option value="monitor">Monitor</option>
                                <option value="peripheral">Peripheral</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-1 mb-4">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Product Name</label>
                        <input required id="prod-name" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" type="text"/>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Brand</label>
                            <input required id="prod-brand" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" type="text"/>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">MSRP Price ($)</label>
                            <input required id="prod-msrp" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" type="number"/>
                        </div>
                    </div>
                    <div class="space-y-1 mb-4">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Image Path or URL</label>
                        <input required id="prod-image" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none" type="text" placeholder="../assets/img/... or https://..."/>
                    </div>
                    <div class="space-y-1 mb-6">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Description</label>
                        <textarea required id="prod-desc" rows="3" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none"></textarea>
                    </div>
                    
                    <div class="pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-end gap-3">
                        <button type="button" onclick="closeModal()" class="px-6 py-3 font-bold text-xs uppercase tracking-widest rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                        <button type="submit" class="px-6 py-3 bg-blue-600 text-white font-bold text-xs uppercase tracking-widest rounded-lg shadow-lg hover:bg-blue-500 transition-colors">Save Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/reviews.js"></script>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        let activeInventory = [];

        function renderTable() {
            const statComponents = document.getElementById('stat-components');
            if (statComponents) statComponents.textContent = activeInventory.length;

            const tbody = document.getElementById('inventory-table-body');
            if (tbody) {
                tbody.innerHTML = activeInventory.map(p => `
                    <tr>
                        <td class="px-6 py-4 font-mono text-xs text-slate-400">#${p.id.toUpperCase()}</td>
                        <td class="px-6 py-4 font-bold flex items-center gap-3">
                            <div class="w-8 h-8 rounded border border-slate-100 dark:border-slate-800 overflow-hidden bg-white flex-shrink-0">
                                <img src="${p.image}" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/32x32?text=NA'">
                            </div>
                            <span class="truncate max-w-[200px]">${p.name}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300 px-2 py-0.5 text-[10px] font-bold rounded uppercase">
                                ${p.category}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="openModal('${p.id}')" class="text-primary font-bold text-xs uppercase hover:underline mr-4">Edit</button>
                            <button onclick="deleteProduct('${p.id}')" class="text-red-500 font-bold text-xs uppercase hover:underline">Delete</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function initInventory() {
            const saved = localStorage.getItem('pcweb_products');
            if (saved) {
                activeInventory = JSON.parse(saved);
            } else if (typeof PRODUCTS !== 'undefined') {
                activeInventory = [...PRODUCTS];
                localStorage.setItem('pcweb_products', JSON.stringify(activeInventory));
            }
            renderTable();
        }

        function openModal(id = null) {
            const modal = document.getElementById('product-modal');
            const form = document.getElementById('product-form');
            const title = document.getElementById('modal-title');
            
            form.reset();
            
            if (id) {
                const product = activeInventory.find(p => p.id === id);
                if (product) {
                    title.textContent = 'Edit Product';
                    document.getElementById('prod-original-id').value = product.id;
                    document.getElementById('prod-id').value = product.id;
                    document.getElementById('prod-name').value = product.name;
                    document.getElementById('prod-category').value = product.category;
                    document.getElementById('prod-brand').value = product.brand;
                    document.getElementById('prod-msrp').value = product.msrp;
                    document.getElementById('prod-image').value = product.image;
                    document.getElementById('prod-desc').value = product.desc;
                }
            } else {
                title.textContent = 'Add New Product';
                document.getElementById('prod-original-id').value = '';
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function saveProduct(e) {
            e.preventDefault();
            const originalId = document.getElementById('prod-original-id').value;
            
            const productData = {
                id: document.getElementById('prod-id').value.trim().toLowerCase().replace(/\s+/g, '-'),
                name: document.getElementById('prod-name').value,
                category: document.getElementById('prod-category').value,
                brand: document.getElementById('prod-brand').value,
                msrp: document.getElementById('prod-msrp').value,
                image: document.getElementById('prod-image').value,
                desc: document.getElementById('prod-desc').value,
            };

            if (originalId) {
                const index = activeInventory.findIndex(p => p.id === originalId);
                if (index > -1) {
                    activeInventory[index] = { ...activeInventory[index], ...productData };
                }
            } else {
                productData.architecture = "N/A";
                productData.cores = 0;
                productData.memory = 0;
                activeInventory.unshift(productData);
            }

            localStorage.setItem('pcweb_products', JSON.stringify(activeInventory));
            renderTable();
            closeModal();
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this component?')) {
                activeInventory = activeInventory.filter(p => p.id !== id);
                localStorage.setItem('pcweb_products', JSON.stringify(activeInventory));
                renderTable();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initInventory();

            if (typeof getPendingReviews === 'function') {
                const reviews = JSON.parse(localStorage.getItem('pcweb_reviews') || '[]');
                const statReviews = document.getElementById('stat-reviews');
                if (statReviews) statReviews.textContent = reviews.length;
                
                const statRating = document.getElementById('stat-rating');
                if (statRating && reviews.length > 0) {
                    statRating.innerHTML = '4.8 <span class="text-lg text-slate-300">/ 5.0</span>';
                }
            }
        });
    </script>
</body>
</html>
