<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Member Registration | PRECISION LAB</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script src="../assets/js/tailwind-config.js"></script>
    <script src="../assets/js/auth.js"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-surface dark:bg-slate-950 text-on-surface dark:text-slate-100 font-body min-h-screen flex flex-col transition-colors duration-300">

    <div id="navbar-placeholder"></div>

    <main class="pt-24 lg:pt-32 max-w-7xl mx-auto px-8 min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-2xl animate-in fade-in zoom-in duration-500">
            <div class="text-center mb-8">
                <h1 data-i18n="register_title" class="text-3xl font-headline font-bold text-slate-900 dark:text-white mb-2">Create your Account</h1>
                <p data-i18n="reg_subtitle" class="text-xs text-slate-400 font-medium leading-relaxed">Join the precision hardware community.</p>
            </div>

            <form id="registration-form" class="space-y-4">
                <div class="space-y-1">
                    <label data-i18n="username_label" class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">User Name</label>
                    <input required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all" name="username" type="text"/>
                </div>
                <div class="space-y-1">
                    <label data-i18n="email_label" class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
                    <input required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all" name="email" type="email"/>
                </div>
                <div class="space-y-1">
                    <label data-i18n="password_label" class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Password</label>
                    <input required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all" name="password" type="password"/>
                </div>
                <button data-i18n="btn_register" class="w-full bg-slate-900 dark:bg-primary text-white py-4 rounded-xl font-headline font-black text-xs tracking-widest uppercase hover:opacity-90 transition-all shadow-xl active:scale-95 mt-4" type="submit">
                    Register Now
                </button>
            </form>

            <div id="message" class="hidden text-xs font-bold text-center mt-4"></div>
                Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Log in</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        const regForm = document.getElementById('registration-form');
        if (regForm) {
            regForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const username = regForm.querySelector('[name="username"]').value;
                const email = regForm.querySelector('[name="email"]').value;
                const password = regForm.querySelector('[name="password"]').value;
                const messageEl = document.getElementById('message');

                const result = register(username, email, password);
                
                if (messageEl) {
                    messageEl.classList.remove('hidden');
                    messageEl.textContent = result.message;

                    if (result.success) {
                        messageEl.className = 'text-emerald-500 text-xs font-bold text-center mt-4';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 1500);
                    } else {
                        messageEl.className = 'text-red-500 text-xs font-bold text-center mt-4';
                    }
                }
            });
        }
    </script>
</body>
</html>
